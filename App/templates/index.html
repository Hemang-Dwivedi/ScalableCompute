<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Distributed Compute</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 24px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; min-width: 280px; }
    .progress { height: 10px; background: #eee; border-radius: 6px; overflow: hidden; }
    .bar { height: 100%; background: #4a90e2; width: 0%; }
    code { background: #f7f7f7; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Distributed Compute Dashboard</h1>

  <div class="row">
    <div class="card" style="flex:1">
      <h3>Workers</h3>
      <button onclick="loadWorkers()">Refresh</button>
      <ul id="workers"></ul>
    </div>
    <div class="card" style="flex:1">
      <h3>Submit</h3>
      <form onsubmit="event.preventDefault(); submitJob();">
        <label>N:</label>
        <input id="n" type="number" value="1000000" min="1"/><br/><br/>
        <label>Steps:</label>
        <input id="steps" type="number" value="10" min="1"/><br/><br/>
        <label>Single queue (optional):</label>
        <input id="queue" type="text" placeholder="e.g. cpu-a"/><br/><br/>
        <label>Shard across queues (comma-separated):</label>
        <input id="targetQueues" type="text" placeholder="cpu-a,cpu-b"/><br/><br/>
        <label>Shards:</label>
        <input id="shards" type="number" value="0" min="0"/><br/><br/>
        <button type="submit">Run</button>
      </form>
      <p>Auth token header (optional): <code>API_AUTH_TOKEN: your-token</code></p>
    </div>
  </div>

  <div style="margin-top:24px">
    <h3>Tasks</h3>
    <div id="tasks"></div>
  </div>

<script>
const TOKEN = ""; // if you set API_AUTH_TOKEN, put it here for the demo UI

function headers() {
  const h = {};
  if (TOKEN) h["API_AUTH_TOKEN"] = TOKEN;
  return h;
}

async function loadWorkers() {
  const res = await fetch("/workers", { headers: headers() });
  const data = await res.json();
  const ul = document.getElementById("workers");
  ul.innerHTML = "";
  (data.workers || []).forEach(w => {
    const li = document.createElement("li");
    li.textContent = `${w.worker}  →  queue: ${w.queue}`;
    ul.appendChild(li);
  });
}

function createTaskCard(id) {
  const wrap = document.createElement("div");
  wrap.className = "card";
  wrap.id = `task-${id}`;
  wrap.innerHTML = `
    <div><strong>Task:</strong> <code>${id}</code></div>
    <div class="progress"><div class="bar" id="bar-${id}"></div></div>
    <div id="text-${id}">state: SUBMITTED</div>
  `;
  document.getElementById("tasks").prepend(wrap);
}

async function pollTask(id) {
  const text = document.getElementById(`text-${id}`);
  const bar = document.getElementById(`bar-${id}`);
  let done = false;
  while (!done) {
    const r = await fetch(`/status/${id}`);
    const d = await r.json();
    const p = d.meta?.progress ? Math.floor(d.meta.progress * 100) : (d.state === "SUCCESS" ? 100 : 0);
    bar.style.width = p + "%";
    text.textContent = `state: ${d.state} | step=${d.meta?.step || "-"} of ${d.meta?.steps || "-"} | latency=${(d.meta?.latency_sec||0).toFixed(3)}s`;
    if (d.state === "SUCCESS" || d.state === "FAILURE" || d.state === "REVOKED") {
      done = true;
    }
    await new Promise(res => setTimeout(res, 800));
  }
}

async function submitJob() {
  const n = parseInt(document.getElementById("n").value, 10);
  const steps = parseInt(document.getElementById("steps").value, 10);
  const queue = document.getElementById("queue").value.trim();
  const tq = document.getElementById("targetQueues").value.trim();
  const shards = parseInt(document.getElementById("shards").value, 10);

  const payload = { n, steps };
  if (queue) payload.queue = queue;
  if (tq) payload.target_queues = tq.split(",").map(s => s.trim()).filter(Boolean);
  if (shards > 0) payload.shards = shards;

  const res = await fetch("/submit", {
    method: "POST",
    headers: { "Content-Type": "application/json", ...headers() },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  createTaskCard(data.task_id);
  pollTask(data.task_id);
}
loadWorkers();
</script>
</body>
</html>
