<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Distributed Compute</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 24px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; min-width: 320px; flex: 1 }
    .progress { height: 10px; background: #eee; border-radius: 6px; overflow: hidden; }
    .bar { height: 100%; background: #4a90e2; width: 0%; transition: width .2s ease; }
    code { background: #f7f7f7; padding: 2px 6px; border-radius: 6px; }
    .pill { display:inline-flex; align-items:center; gap:8px; border:1px solid #ddd; padding:6px 10px; border-radius:999px; margin:4px 6px 0 0; }
    .muted { font-size: 12px; opacity: .7 }
    .btn { padding: 6px 10px; border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; }
    .btn:active { transform: translateY(1px); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 8px; }
    label { display:block; margin-top:8px; }
    input[type="number"], input[type="text"] { width: 180px; }
    pre { background:#0b0b0b; color:#f1f1f1; padding:10px; border-radius:8px; max-height:240px; overflow:auto; white-space:pre-wrap; word-break:break-word; }
    .right { float:right; }
    .card.task.ok   { border-color:#22c55e; box-shadow:0 0 0 2px rgba(34,197,94,.15) inset; }
    .card.task.bad  { border-color:#ef4444; box-shadow:0 0 0 2px rgba(239,68,68,.15) inset; }
    .card.task.wait { border-color:#60a5fa; box-shadow:0 0 0 2px rgba(96,165,250,.12) inset; }
  </style>
</head>
<body>
  <h1>Distributed Compute Dashboard</h1>

  <div class="row">
    <!-- Workers / Queue selector -->
    <div class="card">
      <h3>Workers</h3>
      <div class="muted">Pick the queues (devices) to use for π.</div>
      <div style="margin-top:8px; display:flex; gap:8px;">
        <button class="btn" onclick="loadWorkers()">Refresh</button>
        <button class="btn" onclick="selectAllQueues()">Select all</button>
        <button class="btn" onclick="clearQueues()">Clear</button>
      </div>
      <div id="workersContainer" style="margin-top:10px"><div class="muted">Loading…</div></div>
      <div id="selectedCount" class="muted" style="margin-top:8px">Selected: 0</div>
    </div>

    <!-- Distributed π submit -->
    <div class="card">
      <h3>Compute π (distributed)</h3>
      <form onsubmit="event.preventDefault(); submitPi();">
        <label>Digits (10–1,200,000):</label>
        <input id="piDigits" type="number" value="100000" min="10" max="1200000"/>

        <label>Shards (0 = auto):</label>
        <input id="piShards" type="number" value="0" min="0"/>

        <div style="margin-top:12px;">
          <button class="btn" type="submit">Run π</button>
        </div>
      </form>
    </div>
  </div>

  <div style="margin-top:24px">
    <h3>Tasks</h3>
    <div id="tasks"></div>
  </div>

  <div style="margin-top:24px">
    <h3>Live Sync Feed <span class="muted" id="wsStatus">(connecting&hellip;)</span></h3>
    <div class="muted" style="margin-bottom:8px">
      Results forwarded by workers when their local buffer reaches the sync threshold (default: 5).
    </div>
    <div id="syncFeed"></div>
  </div>

<script>
const TOKEN = ""; // add API token string if used
let AVAILABLE = [];
let SELECTED = new Set();

function headers() { const h={}; if(TOKEN) h["API_AUTH_TOKEN"]=TOKEN; return h; }
function selectedQueuesArray(){ return Array.from(SELECTED.values()); }
function updateSelectedCount(){ document.getElementById("selectedCount").textContent = `Selected: ${SELECTED.size}`; }

function renderQueues() {
  const wrap = document.getElementById("workersContainer"); wrap.innerHTML = "";
  if (!AVAILABLE.length) { wrap.innerHTML = `<div class="muted">No workers online</div>`; return; }
  const grid = document.createElement("div"); grid.className = "grid";
  AVAILABLE.forEach(({worker, queue}) => {
    const id = `q-${queue.replace(/[^a-zA-Z0-9_-]/g, "_")}`;
    const div = document.createElement("label");
    div.className = "pill";
    div.innerHTML = `
      <input id="${id}" type="checkbox" ${SELECTED.has(queue) ? "checked" : ""}/>
      <span><strong>${queue}</strong></span>
      <span class="muted">@ ${worker}</span>`;
    grid.appendChild(div);
    setTimeout(()=>{ const cb=document.getElementById(id);
      if (cb) cb.onchange=(e)=>{ if(e.target.checked) SELECTED.add(queue); else SELECTED.delete(queue); updateSelectedCount(); };
    },0);
  });
  wrap.appendChild(grid); updateSelectedCount();
}

async function loadWorkers(){
  try{ const res=await fetch("/workers",{headers:headers()}); const data=await res.json();
    const seen=new Set(); AVAILABLE=[];
    (data.workers||[]).forEach(w=>{ const key=`${w.queue}|${w.worker}`; if(!seen.has(key)){ seen.add(key); AVAILABLE.push({worker:w.worker, queue:w.queue}); }});
    renderQueues();
  }catch{ document.getElementById("workersContainer").innerHTML=`<div class="muted">Failed to load workers</div>`; }
}
function selectAllQueues(){ AVAILABLE.forEach(({queue})=>SELECTED.add(queue)); renderQueues(); }
function clearQueues(){ SELECTED.clear(); renderQueues(); }


function createPiTaskCard(id){
  const wrap = document.createElement("div");
  wrap.className = "card task wait";
  wrap.id = `task-${id}`;
  wrap.innerHTML = `
    <div><strong>Task:</strong> <code>${id}</code></div>
    <div class="progress" style="margin-top:6px;"><div class="bar" id="bar-${id}"></div></div>
    <div id="text-${id}" class="muted">state: SUBMITTED</div>
    <div id="children-${id}" style="margin-top:10px;"></div>

    <div style="margin-top:12px;"><strong>π (live):</strong></div>
    <pre id="piout-${id}">awaiting chunks…</pre>

    <div style="margin-top:12px;"><strong>Metrics</strong></div>
    <div style="display:grid; gap:10px;">
      <div>
        <div class="muted" id="agg-${id}">—</div>
        <table id="log-${id}" style="width:100%; font-size:12px; border-collapse:collapse;">
          <thead>
            <tr>
              <th>Time</th><th>Kind</th><th>Phase</th><th>Shard</th>
              <th>Queue</th><th>Host</th><th>Bytes</th><th>CRC32</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div>
        <div class="muted">Bandwidth (bytes/sec)</div>
        <svg id="bw-${id}" width="100%" height="120"></svg>
      </div>
    </div>
  `;
  document.getElementById("tasks").prepend(wrap);
}

function renderMetricsTable(taskId, events) {
  const tb = document.querySelector(`#log-${taskId} tbody`);
  if (!tb) return;
  tb.innerHTML = "";
  const fmt = ts => new Date(Number(ts)).toLocaleTimeString();

  // show last ~200 rows max
  for (const ev of (events || []).slice(-200)) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${ev.ts ? fmt(ev.ts) : ""}</td>
      <td>${ev.kind || ""}</td>
      <td>${ev.phase || ""}</td>
      <td>${ev.idx ?? ""}</td>
      <td>${ev.queue || ""}</td>
      <td>${ev.host || ""}</td>
      <td>${ev.dispatch_ms ?? ""}</td>
      <td>${ev.exec_ms ?? ""}</td>
      <td>${ev.bytes ?? ""}</td>
      <td>${ev.crc32 ?? ""}</td>
    `;
    tb.appendChild(tr);
  }
}

function renderBandwidth(taskId, events) {
  const svg = document.getElementById(`bw-${taskId}`);
  if (!svg) return;
  const raw = events || [];

  // group bytes by 1-second buckets
  const bySec = new Map();
  raw.forEach(ev => {
    if (!("bytes" in ev)) return;
    const sec = Math.floor(Number(ev.ts || 0) / 1000);
    bySec.set(sec, (bySec.get(sec) || 0) + Number(ev.bytes || 0));
  });

  const pts = Array.from(bySec.entries()).sort((a,b)=>a[0]-b[0]);
  const w = svg.clientWidth || 600, h = svg.clientHeight || 120;
  svg.innerHTML = "";
  if (pts.length === 0) return;

  const xs = pts.map(p=>p[0]), ys = pts.map(p=>p[1]);
  const minx = xs[0], maxx = xs[xs.length-1];
  const maxy = Math.max(...ys) || 1;

  const sx = v => (w-10) * (v - minx) / Math.max(1, (maxx - minx)) + 5;
  const sy = v => h - 10 - (h-20) * (v / maxy);

  let d = "";
  pts.forEach((p,i) => {
    const x = sx(p[0]), y = sy(p[1]);
    d += (i===0 ? `M ${x} ${y}` : ` L ${x} ${y}`);
  });

  const path = document.createElementNS("http://www.w3.org/2000/svg","path");
  path.setAttribute("d", d);
  path.setAttribute("fill","none");
  path.setAttribute("stroke","#2563eb");
  path.setAttribute("stroke-width","2");
  svg.appendChild(path);
}

async function pollMetrics(taskId){
  while (true) {
    try {
      const r = await fetch(`/metrics/${taskId}`, { headers: headers?.() || {} });
      if (!r.ok) throw new Error(`metrics ${r.status}`);
      const d = await r.json();

      // render table + graph
      renderMetricsTable(taskId, d.events || []);
      renderBandwidth(taskId, d.events || []);

      // optional aggregate line
      const aggEl = document.getElementById(`agg-${taskId}`);
      if (aggEl && d.agg) {
        aggEl.textContent = `events=${d.agg.total_events} | total_bytes=${d.agg.total_bytes} | avg_exec_ms=${d.agg.avg_exec_ms_chunk} | avg_dispatch_ms=${d.agg.avg_dispatch_ms}`;
      }
    } catch (e) {
      console?.warn?.("metrics poll failed", e);
    }
    await new Promise(res => setTimeout(res, 1000));
  }
}



async function pollTaskTree(parentId, mapping){
  const container = document.getElementById(`task-${parentId}`);
  const childWrap = document.getElementById(`children-${parentId}`);
  childWrap.innerHTML = `<div style="font-weight:600">Subtasks</div>`;
  const childBars=new Map();
  let done=false;

  while(!done){
    const r=await fetch(`/status_tree/${parentId}`,{headers:headers()});
    const d=await r.json();

    const text=document.getElementById(`text-${parentId}`);
    const bar=document.getElementById(`bar-${parentId}`);
    text.textContent=`parent state: ${d.parent.state}`;
    bar.style.width=(d.parent.state==="SUCCESS"?"100%":"10%");

    // render children
    for (let i=0;i<(d.children||[]).length;i++){
      const c=d.children[i];
      if(!childBars.has(c.id)){
        const m=mapping?.[i];
        const div=document.createElement("div"); div.style.marginTop="6px";
        div.innerHTML=`
          <div class="muted">${c.id.slice(0,8)}… @ ${m?.queue||"?"} [${(m?.range||[]).join(",")}]</div>
          <div class="progress"><div class="bar" id="bar-${c.id}"></div></div>
          <div id="text-${c.id}" class="muted">state: ${c.state}</div>`;
        childWrap.appendChild(div); childBars.set(c.id,true);
      }
      const p=c?.meta?.progress?Math.floor(c.meta.progress*100):(c.state==="SUCCESS"?100:0);
      const cb=document.getElementById(`bar-${c.id}`); const ct=document.getElementById(`text-${c.id}`);
      if(cb) cb.style.width=p+"%";
      if(ct) ct.textContent=`state: ${c.state} | ${(c.meta?.done||0)}/${(c.meta?.total||0)} (${p}%)`;
    }

    done = ["SUCCESS","FAILURE","REVOKED"].includes(d.parent.state);

    // live color while running
    container.classList.remove("ok","bad");
    if (!done) container.classList.add("wait");

    await new Promise(res=>setTimeout(res, 900));
  }

  // final color
  container.classList.remove("wait");
  if ((await (await fetch(`/status/${parentId}`,{headers:headers()})).json()).state === "SUCCESS") {
    container.classList.add("ok");
  } else {
    container.classList.add("bad");  // FAILURE or REVOKED
  }

  // also show final result in the live box if present
  const finalR = await fetch(`/result/${parentId}`, { headers: headers() });
  const finalD = await finalR.json();
  const t = document.getElementById(`text-${parentId}`);
  const pre = document.getElementById(`piout-${parentId}`);
  if (finalD.ready && finalD.result?.pi) {
    t.textContent = `DONE ✓ — π (first 80 chars): ${finalD.result.pi.slice(0, 80)}…`;
    if (pre) pre.textContent = finalD.result.pi.slice(0, 4000);
  }
}

async function pollPiStream(parentId){
  const pre=document.getElementById(`piout-${parentId}`);
  let finished=false;
  while(!finished){
    const r=await fetch(`/pi_stream/${parentId}?max_chars=4000`,{headers:headers()});
    const d=await r.json();
    if(d.available && d.pi_head){ pre.textContent = d.pi_head; }
    // stop when parent success/failure
    const st=await (await fetch(`/status/${parentId}`,{headers:headers()})).json();
    if(st.state==="SUCCESS" || st.state==="FAILURE" || st.state==="REVOKED"){ finished=true; }
    await new Promise(res=>setTimeout(res, 900));
  }
}

async function submitPi(){
  const digits = parseInt(document.getElementById("piDigits").value, 10);
  const shards = parseInt(document.getElementById("piShards").value, 10) || 0;
  const selected = selectedQueuesArray();
  if (selected.length < 1) { alert("Pick at least one queue (device) in Workers panel."); return; }

  const res = await fetch("/submit_pi", {
    method: "POST",
    headers: { "Content-Type": "application/json", ...(TOKEN ? {"API_AUTH_TOKEN": TOKEN} : {}) },
    body: JSON.stringify({ digits, target_queues: selected, shards })
  });

  if (!res.ok) {
    const text = await res.text();
    alert(`submit_pi failed: ${res.status} ${text}`);
    return;
  }

  const data = await res.json();
  const parentId = data.task_id;   // <-- define it once

  createPiTaskCard(parentId);
  pollTaskTree(parentId, data.assignments || data.mapping);
  pollPiStream(parentId);
  pollMetrics(parentId);           // <-- now starts correctly

}

async function cancelTaskTree(taskId){
  try{
    const r=await fetch(`/task_tree/${taskId}?terminate=true&cleanup=true`, { method:"DELETE", headers:headers() });
    const d=await r.json();
    const t=document.getElementById(`text-${taskId}`);
    if(t) t.textContent = "Canceled ✓";
  }catch(e){ alert("Failed to cancel task."); }
}

// --- Store-and-forward sync feed ---
(function startSyncFeed() {
  var feed = document.getElementById("syncFeed");
  var status = document.getElementById("wsStatus");
  var proto = location.protocol === "https:" ? "wss:" : "ws:";
  var ws = new WebSocket(proto + "//" + location.host + "/ws");

  ws.onopen = function() { status.textContent = "(connected)"; };
  ws.onclose = function() { status.textContent = "(disconnected \u2014 refresh to reconnect)"; };
  ws.onerror = function() { status.textContent = "(error)"; };

  ws.onmessage = function(event) {
    var data = JSON.parse(event.data);
    var card = document.createElement("div");
    card.className = "card";
    card.style.marginBottom = "10px";

    var header = document.createElement("div");
    var workerSpan = document.createElement("strong");
    workerSpan.textContent = data.worker_id;
    var timeSpan = document.createElement("span");
    timeSpan.className = "muted";
    timeSpan.style.marginLeft = "8px";
    timeSpan.textContent = new Date().toLocaleTimeString();
    var countSpan = document.createElement("span");
    countSpan.className = "muted";
    countSpan.style.marginLeft = "8px";
    countSpan.textContent = (data.count || 0) + " result(s) forwarded";
    header.appendChild(workerSpan);
    header.appendChild(timeSpan);
    header.appendChild(countSpan);
    card.appendChild(header);

    var pillsDiv = document.createElement("div");
    pillsDiv.style.marginTop = "8px";
    (data.results || []).forEach(function(r) {
      var pill = document.createElement("div");
      pill.className = "pill";
      var digitsSpan = document.createElement("span");
      digitsSpan.textContent = r.digits + " digits";
      var piCode = document.createElement("code");
      piCode.style.fontSize = "11px";
      piCode.textContent = String(r.pi_head || "").slice(0, 30) + "\u2026";
      pill.appendChild(digitsSpan);
      pill.appendChild(piCode);
      pillsDiv.appendChild(pill);
    });
    card.appendChild(pillsDiv);
    feed.prepend(card);
  };
})();
// --- end sync feed ---

loadWorkers();
</script>
</body>
</html>
