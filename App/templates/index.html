<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Distributed Compute</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 24px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; min-width: 280px; }
    .progress { height: 10px; background: #eee; border-radius: 6px; overflow: hidden; }
    .bar { height: 100%; background: #4a90e2; width: 0%; }
    code { background: #f7f7f7; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Distributed Compute Dashboard</h1>

  <div class="row">
    <div class="card" style="flex:1">
      <h3>Workers</h3>
      <button onclick="loadWorkers()">Refresh</button>
      <ul id="workers"></ul>
    </div>
    <div class="card" style="flex:1">
      <h3>Submit</h3>
      <form onsubmit="event.preventDefault(); submitJob();">
        <label>N:</label>
        <input id="n" type="number" value="1000000" min="1"/><br/><br/>
        <label>Steps:</label>
        <input id="steps" type="number" value="10" min="1"/><br/><br/>
        <label>Single queue (optional):</label>
        <input id="queue" type="text" placeholder="e.g. cpu-a"/><br/><br/>
        <label>Shard across queues (comma-separated):</label>
        <input id="targetQueues" type="text" placeholder="cpu-a,cpu-b"/><br/><br/>
        <label>Shards:</label>
        <input id="shards" type="number" value="0" min="0"/><br/><br/>
        <button type="submit">Run</button>
      </form>
      <p>Auth token header (optional): <code>API_AUTH_TOKEN: your-token</code></p>
    </div>
    <div class="card" style="flex:1">
      <h3>Compute π (distributed)</h3>
      <form onsubmit="event.preventDefault(); submitPi();">
        <label>Digits:</label>
        <input id="piDigits" type="number" value="100000" min="10" max="1200000"/><br/><br/>
        <label>Queues (comma-separated):</label>
        <input id="piQueues" type="text" placeholder="cpu-a,cpu-b"/><br/><br/>
        <label>Shards (0 = auto):</label>
        <input id="piShards" type="number" value="0" min="0"/><br/><br/>
        <button type="submit">Run π</button>
      </form>
      <p style="font-size:12px;opacity:.7">Tip: ~14.18 digits per term; 100k digits ≈ ~7,050 terms.</p>
    </div>

  </div>

  <div style="margin-top:24px">
    <h3>Tasks</h3>
    <div id="tasks"></div>
  </div>

<script>
const TOKEN = ""; // if you set API_AUTH_TOKEN, put it here for the demo UI

function headers() {
  const h = {};
  if (TOKEN) h["API_AUTH_TOKEN"] = TOKEN;
  return h;
}
async function submitPi() {
  const digits = parseInt(document.getElementById("piDigits").value, 10);
  const queues = document.getElementById("piQueues").value.split(",").map(s=>s.trim()).filter(Boolean);
  const shards = parseInt(document.getElementById("piShards").value, 10) || 0;

  const res = await fetch("/submit_pi", {
    method: "POST",
    headers: { "Content-Type": "application/json", ...(TOKEN ? {"API_AUTH_TOKEN": TOKEN} : {}) },
    body: JSON.stringify({ digits, target_queues: queues, shards })
  });
  const data = await res.json();

  // Create parent card
  createTaskCard(data.task_id);
  pollTaskTree(data.task_id, data.mapping);
}

async function pollTaskTree(parentId, mapping) {
  // Create child bars
  const container = document.getElementById(`task-${parentId}`);
  const childWrap = document.createElement("div");
  childWrap.id = `children-${parentId}`;
  childWrap.innerHTML = `<div style="margin-top:10px;font-weight:600">Subtasks</div>`;
  container.appendChild(childWrap);

  const childBars = new Map();

  let done = false;
  while (!done) {
    const r = await fetch(`/status_tree/${parentId}`);
    const d = await r.json();

    // Parent progress (only final state available for chord body)
    const text = document.getElementById(`text-${parentId}`);
    const bar = document.getElementById(`bar-${parentId}`);
    text.textContent = `parent state: ${d.parent.state}`;
    bar.style.width = (d.parent.state === "SUCCESS" ? "100%" : "5%");

    // Render/Update children (chunk tasks)
    for (let i = 0; i < (d.children || []).length; i++) {
      const c = d.children[i];
      if (!childBars.has(c.id)) {
        const m = mapping?.[i];
        const div = document.createElement("div");
        div.style.marginTop = "6px";
        div.innerHTML = `
          <div style="font-size:12px;opacity:.8">${c.id.slice(0,8)}…  @ ${m?.queue || "?"}  [${(m?.range||[]).join(",")}]</div>
          <div class="progress"><div class="bar" id="bar-${c.id}"></div></div>
          <div id="text-${c.id}" style="font-size:12px;opacity:.8">state: ${c.state}</div>
        `;
        childWrap.appendChild(div);
        childBars.set(c.id, true);
      }
      const p = c?.meta?.progress ? Math.floor(c.meta.progress * 100) : (c.state === "SUCCESS" ? 100 : 0);
      const cb = document.getElementById(`bar-${c.id}`);
      const ct = document.getElementById(`text-${c.id}`);
      if (cb) cb.style.width = p + "%";
      if (ct) ct.textContent = `state: ${c.state} | ${(c.meta?.done||0)}/${(c.meta?.total||0)} (${p}%)`;
    }

    done = d.parent.state === "SUCCESS" || d.parent.state === "FAILURE";
    await new Promise(res => setTimeout(res, 1000));
  }

  // When parent is SUCCESS, fetch the result (π string)
  const finalR = await fetch(`/result/${parentId}`);
  const finalD = await finalR.json();
  const t = document.getElementById(`text-${parentId}`);
  if (finalD.ready && finalD.result?.pi) {
    t.textContent = `DONE ✓ — π (first 80 chars): ${finalD.result.pi.slice(0, 80)}…`;
  }
}
async function loadWorkers() {
  const res = await fetch("/workers", { headers: headers() });
  const data = await res.json();
  const ul = document.getElementById("workers");
  ul.innerHTML = "";
  (data.workers || []).forEach(w => {
    const li = document.createElement("li");
    li.textContent = `${w.worker}  →  queue: ${w.queue}`;
    ul.appendChild(li);
  });
}

function createTaskCard(id) {
  const wrap = document.createElement("div");
  wrap.className = "card";
  wrap.id = `task-${id}`;
  wrap.innerHTML = `
    <div><strong>Task:</strong> <code>${id}</code></div>
    <div class="progress"><div class="bar" id="bar-${id}"></div></div>
    <div id="text-${id}">state: SUBMITTED</div>
  `;
  document.getElementById("tasks").prepend(wrap);
}

async function pollTask(id) {
  const text = document.getElementById(`text-${id}`);
  const bar = document.getElementById(`bar-${id}`);
  let done = false;
  while (!done) {
    const r = await fetch(`/status/${id}`);
    const d = await r.json();
    const p = d.meta?.progress ? Math.floor(d.meta.progress * 100) : (d.state === "SUCCESS" ? 100 : 0);
    bar.style.width = p + "%";
    text.textContent = `state: ${d.state} | step=${d.meta?.step || "-"} of ${d.meta?.steps || "-"} | latency=${(d.meta?.latency_sec||0).toFixed(3)}s`;
    if (d.state === "SUCCESS" || d.state === "FAILURE" || d.state === "REVOKED") {
      done = true;
    }
    await new Promise(res => setTimeout(res, 800));
  }
}

async function submitJob() {
  const n = parseInt(document.getElementById("n").value, 10);
  const steps = parseInt(document.getElementById("steps").value, 10);
  const queue = document.getElementById("queue").value.trim();
  const tq = document.getElementById("targetQueues").value.trim();
  const shards = parseInt(document.getElementById("shards").value, 10);

  const payload = { n, steps };
  if (queue) payload.queue = queue;
  if (tq) payload.target_queues = tq.split(",").map(s => s.trim()).filter(Boolean);
  if (shards > 0) payload.shards = shards;

  const res = await fetch("/submit", {
    method: "POST",
    headers: { "Content-Type": "application/json", ...headers() },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  createTaskCard(data.task_id);
  pollTask(data.task_id);
}
loadWorkers();
</script>
</body>
</html>
